<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuizMaster</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#1f1147;
overflow:hidden;

}

button{

cursor:pointer;

}

.screen{

display:none;
width:100vw;
height:100vh;

}

.active{

display:flex;

}

/* ===========================
HOME
=========================== */

#home{

justify-content:center;
align-items:center;

}

.card{

width:800px;
background:white;
border-radius:20px;
padding:40px;

box-shadow:0 20px 60px rgba(0,0,0,.3);

}

.logo{

font-size:60px;
font-weight:bold;
text-align:center;
margin-bottom:10px;

}

.subtitle{

text-align:center;
font-size:20px;
color:#777;
margin-bottom:30px;

}

.menu{

display:flex;
flex-direction:column;
gap:20px;

}

.menu button{

padding:20px;

border:none;

border-radius:12px;

font-size:22px;

background:#6c3cff;
color:white;

transition:.3s;

}

.menu button:hover{

transform:scale(1.02);

background:#5123db;

}

/* ===================
GAME
=================== */

#game{

flex-direction:column;

padding:30px;

color:white;

}

.top{

display:flex;

justify-content:space-between;

align-items:center;

}

.timer{

width:90px;
height:90px;
border-radius:50%;
background:white;
color:#222;

display:flex;

justify-content:center;

align-items:center;

font-size:40px;

font-weight:bold;

}

.score{

font-size:35px;

}

.progress{

margin-top:20px;

height:14px;

background:#5745b7;

border-radius:20px;

overflow:hidden;

}

.progress div{

height:100%;

width:0%;

background:#ffd93b;

transition:.3s;

}

.question{

margin-top:60px;

font-size:40px;

text-align:center;

min-height:140px;

}

.answers{

margin-top:50px;

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

}

.answer{

padding:25px;

border-radius:14px;

font-size:24px;

display:flex;

align-items:center;

justify-content:center;

transition:.25s;

user-select:none;

}

.answer:hover{

transform:scale(1.03);

}

.red{

background:#ff3355;

}

.blue{

background:#2b8cff;

}

.green{

background:#2ecb70;

}

.yellow{

background:#ffbe00;

}

.correct{

animation:correct .5s infinite alternate;

}

.wrong{

opacity:.3;

}

@keyframes correct{

from{

transform:scale(1);

}

to{

transform:scale(1.05);

}

}

/* =========================
RESULT
========================= */

#result{

justify-content:center;

align-items:center;

}

.resultCard{

width:700px;

background:white;

padding:50px;

border-radius:20px;

text-align:center;

}

.resultCard h1{

font-size:60px;

margin-bottom:20px;

}

.resultCard h2{

font-size:90px;

margin:30px;

color:#6c3cff;

}

.resultCard button{

padding:20px 40px;

font-size:24px;

border:none;

border-radius:10px;

background:#6c3cff;

color:white;

}

</style>

</head>

<body>

<div id="home" class="screen active">

<div class="card">

<div class="logo">

QuizMaster

</div>

<div class="subtitle">

Мини аналог Kahoot

</div>

<div class="menu">

<button id="start">

Начать игру

</button>

</div>

</div>

</div>

<div id="game" class="screen">

<div class="top">

<div class="score">

Очки:
<span id="score">

0

</span>

</div>

<div class="timer" id="timer">

20

</div>

</div>

<div class="progress">

<div id="progress"></div>

</div>

<div class="question" id="question">

Вопрос

</div>

<div class="answers">

<div class="answer red"></div>

<div class="answer blue"></div>

<div class="answer green"></div>

<div class="answer yellow"></div>

</div>

</div>

<div id="result" class="screen">

<div class="resultCard">

<h1>

Игра окончена

</h1>

<h2 id="finalScore">

0

</h2>

<button onclick="location.reload()">

Играть снова

</button>

</div>

</div>

<script>

const questions=[

{

question:"Столица Франции?",

answers:[

"Берлин",

"Париж",

"Рим",

"Мадрид"

],

correct:1

},

{

question:"2+2",

answers:[

"3",

"4",

"5",

"8"

],

correct:1

},

{

question:"HTML это...",

answers:[

"Язык разметки",

"Язык программирования",

"База данных",

"Сервер"

],

correct:0

},

{

question:"CSS нужен для",

answers:[

"Дизайна",

"Музыки",

"Видео",

"Сервера"

],

correct:0

}

];

let current=0;

let score=0;

let timer=20;

let interval;

const start=document.getElementById("start");
const home=document.getElementById("home");
const game=document.getElementById("game");
const result=document.getElementById("result");

const question=document.getElementById("question");

const answers=document.querySelectorAll(".answer");

const timerDiv=document.getElementById("timer");

const scoreDiv=document.getElementById("score");

const progress=document.getElementById("progress");

start.onclick=()=>{

home.classList.remove("active");

game.classList.add("active");

loadQuestion();

};
function loadQuestion(){

clearInterval(interval);

timer=20;

timerDiv.textContent=timer;

progress.style.width=((current)/questions.length*100)+"%";

const q=questions[current];

question.textContent=q.question;

for(let i=0;i<4;i++){

answers[i].textContent=q.answers[i];

answers[i].classList.remove("correct");

answers[i].classList.remove("wrong");

answers[i].style.pointerEvents="auto";

answers[i].onclick=()=>answer(i);

}

interval=setInterval(updateTimer,1000);

}

function updateTimer(){

timer--;

timerDiv.textContent=timer;

if(timer<=0){

clearInterval(interval);

showCorrect();

setTimeout(nextQuestion,1500);

}

}

function answer(index){

clearInterval(interval);

const q=questions[current];

answers.forEach(a=>a.style.pointerEvents="none");

if(index===q.correct){

answers[index].classList.add("correct");

score+=timer*100;

scoreDiv.textContent=score;

}else{

answers[index].classList.add("wrong");

answers[q.correct].classList.add("correct");

}

setTimeout(nextQuestion,1500);

}

function showCorrect(){

const q=questions[current];

answers[q.correct].classList.add("correct");

answers.forEach(a=>a.style.pointerEvents="none");

}

function nextQuestion(){

current++;

if(current>=questions.length){

finishGame();

return;

}

loadQuestion();

}

function finishGame(){

game.classList.remove("active");

result.classList.add("active");

document.getElementById("finalScore").textContent=score;

}

</script>

</body>

</html>
