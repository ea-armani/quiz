<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Экран ведущего · Квиз по материалам</title>
<style>
  :root{
    --ink:#161311; --paper:#f7f4ee; --paper-2:#efe9dd; --line:rgba(22,19,17,0.14);
    --gold:#9c7b3d; --gold-deep:#6f5726; --card:#fffdf8;
    --red:#8a3324; --red-bg:#f6e5df; --green:#39543f; --green-bg:#e3ece2;
    --serif:'Iowan Old Style','Palatino Linotype','Book Antiqua',Georgia,'Times New Roman',serif;
    --sans:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
    --c0:#8a3324; --c1:#2f5a86; --c2:#6f5726; --c3:#39543f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:radial-gradient(ellipse at top left, rgba(156,123,61,0.07), transparent 55%), var(--paper);
    color:var(--ink); font-family:var(--sans); min-height:100vh;}
  .wrap{max-width:1100px;margin:0 auto;padding:40px 28px 90px;}
  header.top{border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:30px;display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;}
  .brand-eyebrow{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold-deep);font-weight:600;margin-bottom:6px;}
  h1.title{font-family:var(--serif);font-weight:400;font-size:clamp(26px,4vw,38px);margin:0;line-height:1.05;}
  .status-pill{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#8a837c;border:1px solid var(--line);padding:6px 12px;white-space:nowrap;}

  .screen{display:none;} .screen.active{display:block;}

  button{font-family:var(--sans);border:1px solid var(--ink);background:var(--ink);color:var(--paper);
    padding:15px 26px;font-size:13px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;
    cursor:pointer;transition:opacity .12s;}
  button:hover{opacity:.85;} button:disabled{opacity:.3;cursor:not-allowed;}
  button.ghost{background:transparent;color:var(--ink);}
  button.ghost:hover{background:var(--paper-2);}

  /* LOBBY */
  .join-box{background:var(--card);border:1px solid var(--line);padding:34px;text-align:center;margin-bottom:26px;}
  .join-box .label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-deep);font-weight:600;margin-bottom:10px;}
  .join-url{font-family:var(--serif);font-size:clamp(20px,4vw,30px);word-break:break-all;}
  .player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:24px 0;}
  .player-chip{background:var(--card);border:1px solid var(--line);padding:12px 14px;font-size:14px;text-align:center;font-weight:600;}
  .player-count{font-family:var(--serif);font-size:22px;margin-bottom:14px;}
  .empty-note{color:#8a837c;font-size:13px;text-align:center;padding:20px 0;}

  /* QUESTION */
  .q-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:16px;}
  .cat-label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-deep);font-weight:600;}
  .counter{font-size:13px;color:#6b6560;font-variant-numeric:tabular-nums;}
  .timer{font-family:var(--serif);font-size:40px;color:var(--gold-deep);font-variant-numeric:tabular-nums;}
  .qcard{background:var(--card);border:1px solid var(--line);padding:40px 34px;margin-bottom:22px;}
  .qtext{font-family:var(--serif);font-size:clamp(24px,4vw,34px);line-height:1.3;text-align:center;}
  .answered-note{text-align:center;color:#6b6560;font-size:13px;margin-top:16px;}
  .opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:640px){.opt-grid{grid-template-columns:1fr;}}
  .opt-row{position:relative;border:1px solid var(--line);background:var(--card);padding:16px 18px;font-size:15px;overflow:hidden;}
  .opt-row .bar{position:absolute;left:0;top:0;bottom:0;background:var(--paper-2);z-index:0;transition:width .3s ease;}
  .opt-row .content{position:relative;z-index:1;display:flex;justify-content:space-between;gap:10px;}
  .opt-row .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:8px;}
  .opt-row.correct{border-color:var(--green);background:var(--green-bg);}
  .opt-row.correct .content{color:var(--green);font-weight:700;}
  .opt-row .n{font-variant-numeric:tabular-nums;color:#8a837c;font-size:13px;}
  .nav-row{display:flex;justify-content:center;gap:12px;margin-top:26px;}

  /* LEADERBOARD */
  .lb{max-width:560px;margin:20px auto 0;}
  .lb-row{display:flex;align-items:center;gap:14px;padding:13px 4px;border-bottom:1px solid var(--line);}
  .lb-rank{font-family:var(--serif);font-size:20px;color:var(--gold-deep);width:32px;}
  .lb-name{flex:1;font-weight:600;font-size:15px;}
  .lb-score{font-variant-numeric:tabular-nums;font-size:15px;color:#6b6560;}
  .lb-row.top .lb-rank{color:var(--gold);}

  .final-title{font-family:var(--serif);font-size:clamp(30px,5vw,44px);text-align:center;margin-bottom:6px;}
  .final-sub{text-align:center;color:#8a837c;font-size:13px;margin-bottom:20px;}

  footer.note{margin-top:50px;padding-top:18px;border-top:1px solid var(--line);font-size:11px;color:#a39c92;text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <div class="brand-eyebrow">Материалы одежды и обуви</div>
      <h1 class="title">Экран ведущего</h1>
    </div>
    <div style="display: flex; align-items: center; gap: 12px;">
      <button id="btnStopGlobal" class="ghost" style="display: none; padding: 8px 14px; font-size: 11px; border-color: var(--red); color: var(--red); font-weight: 700; background: var(--red-bg);">Остановить игру</button>
      <div class="status-pill" id="connPill">подключение…</div>
    </div>
  </header>

  <div class="screen active" id="screen-lobby">
    <div class="join-box">
      <div class="label">Ссылка для участников</div>
      <div class="join-url" id="joinUrl">…</div>
    </div>
    <div class="player-count" id="playerCount">0 участников</div>
    <div class="player-grid" id="playerGrid"></div>
    <div class="empty-note" id="emptyNote">Ждём подключений — участники заходят по ссылке выше со своих телефонов.</div>
    <div class="nav-row">
      <button class="ghost" id="btnReset">Новая игра</button>
      <button id="btnStart" disabled>Начать игру</button>
    </div>
  </div>

  <div class="screen" id="screen-question">
    <div class="q-top">
      <div>
        <div class="cat-label" id="catLabel"></div>
        <div class="counter" id="counter"></div>
      </div>
      <div class="timer" id="timer">--</div>
    </div>
    <div class="qcard">
      <div class="qtext" id="qtext"></div>
      <div class="answered-note" id="answeredNote"></div>
    </div>
    <div class="opt-grid" id="optGrid"></div>
    <div class="nav-row">
      <button class="ghost" id="btnReveal">Показать ответ</button>
      <button id="btnNext" style="display:none;">Далее</button>
    </div>
  </div>

  <div class="screen" id="screen-leaderboard">
    <div class="final-title">Таблица лидеров</div>
    <div class="final-sub" id="lbSub"></div>
    <div class="lb" id="lbList"></div>
    <div class="nav-row"><button id="btnContinue">Следующий вопрос</button></div>
  </div>

  <div class="screen" id="screen-ended">
    <div class="final-title">Игра окончена</div>
    <div class="final-sub">Итоговый результат</div>
    <div class="lb" id="finalList"></div>
    <div class="nav-row"><button class="ghost" id="btnRestart">Новая игра</button></div>
  </div>

  <footer class="note">Экран для проектора. Держите эту вкладку открытой — она управляет ходом игры.</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-config.js"></script>
<script src="questions.js"></script>
<script>
(function(){
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const COLORS = ['c0','c1','c2','c3'];
  const TOTAL = typeof QUESTIONS !== 'undefined' ? QUESTIONS.length : 0;

  const screens = {
    lobby: document.getElementById('screen-lobby'),
    question: document.getElementById('screen-question'),
    leaderboard: document.getElementById('screen-leaderboard'),
    ended: document.getElementById('screen-ended'),
  };
  function showScreen(name){ 
    Object.values(screens).forEach(s => { if(s) s.classList.remove('active'); }); 
    if(screens[name]) screens[name].classList.add('active'); 
  }

  let state = null;      
  let players = [];
  let answers = [];      
  let globalTimerHandle = null;
  let revealed = false;

  // Локальные маркеры времени и фаз игры для предотвращения циклов
  let lastPhaseTracker = '';
  let statusStartTime = Date.now();
  let lastTriggeredPhase = ''; 

  // Динамическое определение ссылки игрока
  const joinUrl = location.href.includes('host.html') 
    ? location.href.replace('host.html', 'player.html') 
    : location.origin + '/player.html';
  
  const joinUrlEl = document.getElementById('joinUrl');
  if(joinUrlEl) joinUrlEl.textContent = joinUrl;

  async function loadAll(){
    try {
      const { data: gs } = await sb.from('game_state').select('*').eq('id',1).single();
      if(!gs) return;
      state = gs;
      
      const { data: pl } = await sb.from('players').select('*').order('joined_at');
      players = pl || [];
      
      if(state.current_index >= 0){
        const { data: ans } = await sb.from('answers').select('*').eq('question_index', state.current_index);
        answers = ans || [];
      } else { 
        answers = []; 
      }
      render();
    } catch (e) {
      console.error("Ошибка синхронизации данных:", e);
    }
  }

  sb.channel('host-sync')
    .on('postgres_changes', {event:'*', schema:'public', table:'game_state'}, loadAll)
    .on('postgres_changes', {event:'*', schema:'public', table:'players'}, loadAll)
    .on('postgres_changes', {event:'*', schema:'public', table:'answers'}, loadAll)
    .subscribe(status=>{
      const conn = document.getElementById('connPill');
      if(conn) conn.textContent = status === 'SUBSCRIBED' ? 'в сети' : 'подключение…';
    });

  loadAll();

  // Безопасный глобальный цикл таймера (раз в 250мс)
  clearInterval(globalTimerHandle);
  globalTimerHandle = setInterval(tick, 250);

  function render(){
    if(!state) return;

    // Фиксация момента смены игровой фазы
    const currentPhase = state.status + '_' + state.current_index;
    if (currentPhase !== lastPhaseTracker) {
      lastPhaseTracker = currentPhase;
      statusStartTime = Date.now();
    }

    // Управление видимостью экстренной кнопки
    const btnStopGlobal = document.getElementById('btnStopGlobal');
    if (btnStopGlobal) {
      if (['question', 'reveal', 'leaderboard'].includes(state.status)) {
        btnStopGlobal.style.display = 'inline-block';
      } else {
        btnStopGlobal.style.display = 'none';
      }
    }

    if(state.status === 'lobby'){
      showScreen('lobby');
      const cp = document.getElementById('playerCount');
      if(cp) cp.textContent = players.length + ' ' + pluralPart(players.length);
      
      const en = document.getElementById('emptyNote');
      if(en) en.style.display = players.length ? 'none' : 'block';
      
      const grid = document.getElementById('playerGrid');
      if(grid) {
        grid.innerHTML = '';
        players.forEach(p=>{
          const d = document.createElement('div'); d.className='player-chip'; d.textContent = p.name;
          grid.appendChild(d);
        });
      }
      const bs = document.getElementById('btnStart');
      if(bs) bs.disabled = players.length === 0;
    } 
    else if(state.status === 'question' || state.status === 'reveal'){
      showScreen('question');
      revealed = state.status === 'reveal';
      const item = QUESTIONS[state.current_index];
      if (!item) return;

      const cl = document.getElementById('catLabel'); if(cl) cl.textContent = item.cat || '';
      const cnt = document.getElementById('counter'); if(cnt) cnt.textContent = (state.current_index+1) + ' / ' + TOTAL;
      const qt = document.getElementById('qtext'); if(qt) qt.textContent = item.q || '';
      const an = document.getElementById('answeredNote'); if(an) an.textContent = answers.length + ' из ' + players.length + ' ответили';

      const grid = document.getElementById('optGrid');
      if(grid) {
        grid.innerHTML = '';
        if(item.options) {
          item.options.forEach((opt, i)=>{
            const count = answers.filter(a=>a.option_index===i).length;
            const pct = answers.length ? Math.round(100*count/answers.length) : 0;
            const row = document.createElement('div');
            row.className = 'opt-row' + (revealed && i===item.correct ? ' correct' : '');
            row.innerHTML = `<div class="bar" style="width:${revealed?pct:0}%"></div>
              <div class="content"><span><span class="dot" style="background:var(--${COLORS[i] || 'c0'})"></span>${opt}</span>
              <span class="n">${revealed ? pct+'%' : ''}</span></div>`;
            grid.appendChild(row);
          });
        }
      }

      const br = document.getElementById('btnReveal'); if(br) br.style.display = revealed ? 'none' : 'inline-block';
      const bn = document.getElementById('btnNext'); if(bn) bn.style.display = revealed ? 'inline-block' : 'none';
    } 
    else if(state.status === 'leaderboard'){
      showScreen('leaderboard');
      renderLeaderboard('lbList');
    } 
    else if(state.status === 'ended'){
      showScreen('ended');
      renderLeaderboard('finalList');
    }
  }

  // Центральный мозг автоматического переключения
  async function tick() {
    if (!state) return;

    const now = Date.now();
    const currentPhase = state.status + '_' + state.current_index;

    if (state.status === 'question') {
      // 1. Экран вопроса
      const started = state.question_started_at ? new Date(state.question_started_at).getTime() : now;
      const elapsed = (now - started) / 1000;
      const limit = state.time_limit || 30;
      const left = Math.max(0, Math.ceil(limit - elapsed));
      
      const tEl = document.getElementById('timer');
      if(tEl) tEl.textContent = left;
      
      const allAnswered = players.length > 0 && answers.length >= players.length;
      
      // Авто-показ ответа, если вышло время или ответили все
      if ((left <= 0 || allAnswered) && !revealed) {
        if (lastTriggeredPhase !== currentPhase) {
          lastTriggeredPhase = currentPhase;
          await reveal();
        }
      }
    } 
    else if (state.status === 'reveal') {
      // 2. Автоматика экрана правильного ответа (5 секунд)
      const tEl = document.getElementById('timer'); if(tEl) tEl.textContent = '—';
      const elapsed = (now - statusStartTime) / 1000;
      const limit = 5; 
      const left = Math.max(0, Math.ceil(limit - elapsed));
      
      const btnNext = document.getElementById('btnNext');
      if (btnNext) btnNext.textContent = `Далее (${left})`;

      if (elapsed >= limit) {
        if (lastTriggeredPhase !== currentPhase) {
          lastTriggeredPhase = currentPhase;
          try {
            await sb.from('game_state').update({status:'leaderboard'}).eq('id',1);
          } catch(e){}
        }
      }
    } 
    else if (state.status === 'leaderboard') {
      // 3. Автоматика экрана таблицы лидеров (7 секунд)
      const elapsed = (now - statusStartTime) / 1000;
      const limit = 7; 
      const left = Math.max(0, Math.ceil(limit - elapsed));
      const isLast = state.current_index >= TOTAL - 1;
      
      const btnContinue = document.getElementById('btnContinue');
      if (btnContinue) {
        btnContinue.textContent = (isLast ? 'Показать итог' : 'Следующий вопрос') + ` (${left})`;
      }

      if (elapsed >= limit) {
        if (lastTriggeredPhase !== currentPhase) {
          lastTriggeredPhase = currentPhase;
          const nextIndex = state.current_index + 1;
          try {
            if(nextIndex >= TOTAL){
              await sb.from('game_state').update({status:'ended'}).eq('id',1);
            } else {
              await sb.from('game_state').update({
                status: 'question', 
                current_index: nextIndex, 
                question_started_at: new Date().toISOString()
              }).eq('id',1);
            }
          } catch(e){}
        }
      }
    }
  }

  function renderLeaderboard(elId){
    const sorted = players.slice().sort((a,b)=>b.score-a.score);
    const el = document.getElementById(elId);
    if(!el) return;
    el.innerHTML = '';
    sorted.forEach((p,i)=>{
      const row = document.createElement('div');
      row.className = 'lb-row' + (i<3 ? ' top' : '');
      row.innerHTML = `<div class="lb-rank">${i+1}</div><div class="lb-name">${p.name}</div><div class="lb-score">${p.score}</div>`;
      el.appendChild(row);
    });
    const sub = document.getElementById('lbSub');
    if (sub && state) sub.textContent = 'После вопроса ' + (state.current_index+1) + ' из ' + TOTAL;
  }

  function pluralPart(n){
    const mod10 = n%10, mod100 = n%100;
    if(mod10===1 && mod100!==11) return 'участник';
    if([2,3,4].includes(mod10) && ![12,13,14].includes(mod100)) return 'участника';
    return 'участников';
  }

  async function reveal(){
    revealed = true;
    const item = QUESTIONS[state.current_index];
    if(!item) return;
    const started = new Date(state.question_started_at).getTime();
    
    const scoreUpdates = [];
    for(const a of answers){
      if(a.correct){
        const elapsedMs = new Date(a.answered_at).getTime() - started;
        const limitMs = (state.time_limit || 30) * 1000;
        const ratio = Math.min(1, Math.max(0, elapsedMs / limitMs));
        const pts = Math.round(500 + 500*(1-ratio));
        const p = players.find(pl=>pl.id===a.player_id);
        if(p){ 
          scoreUpdates.push(sb.from('players').update({score: p.score + pts}).eq('id', p.id)); 
        }
      }
    }
    if (scoreUpdates.length > 0) {
      try { await Promise.all(scoreUpdates); } catch(e){}
    }
    try { await sb.from('game_state').update({status:'reveal'}).eq('id',1); } catch(e){}
  }

  // Ручные клики (на всякий случай дублируют логику и блокируют таймер текущей фазы)
  document.getElementById('btnStart').addEventListener('click', async ()=>{
    lastTriggeredPhase = state.status + '_' + state.current_index;
    try { await sb.from('game_state').update({status:'question', current_index:0, question_started_at: new Date().toISOString()}).eq('id',1); } catch(e){}
  });

  document.getElementById('btnReveal').addEventListener('click', async () => {
    lastTriggeredPhase = state.status + '_' + state.current_index;
    await reveal();
  });

  document.getElementById('btnNext').addEventListener('click', async ()=>{
    lastTriggeredPhase = state.status + '_' + state.current_index;
    try { await sb.from('game_state').update({status:'leaderboard'}).eq('id',1); } catch(e){}
  });

  document.getElementById('btnContinue').addEventListener('click', async ()=>{
    lastTriggeredPhase = state.status + '_' + state.current_index;
    const nextIndex = state.current_index + 1;
    try {
      if(nextIndex >= TOTAL){
        await sb.from('game_state').update({status:'ended'}).eq('id',1);
      } else {
        await sb.from('game_state').update({status:'question', current_index: nextIndex, question_started_at: new Date().toISOString()}).eq('id',1);
      }
    } catch(e){}
  });

  // Кнопка экстренной / моментальной остановки игры
  document.getElementById('btnStopGlobal').addEventListener('click', async () => {
    if(confirm('Вы действительно хотите досрочно завершить игру? Будут выведены итоговые результаты.')) {
      lastTriggeredPhase = state.status + '_' + state.current_index;
      try { await sb.from('game_state').update({status:'ended'}).eq('id',1); } catch(e){}
    }
  });

  async function resetGame(){
    try {
      await sb.from('answers').delete().neq('player_id','00000000-0000-0000-0000-000000000000');
      await sb.from('players').delete().neq('id','00000000-0000-0000-0000-000000000000');
      await sb.from('game_state').update({status:'lobby', current_index:-1, question_started_at:null}).eq('id',1);
    } catch(e){}
  }
  
  document.getElementById('btnReset').addEventListener('click', ()=>{
    if(confirm('Сбросить текущую сессию и начать заново? Все очки обнулятся.')) resetGame();
  });
  document.getElementById('btnRestart').addEventListener('click', resetGame);

})();
</script>
</body>
</html>
